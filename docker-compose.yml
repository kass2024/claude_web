services:
  mysql:
    image: mysql:8.4
    container_name: jc_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: jc_consulting
      MYSQL_USER: jc
      MYSQL_PASSWORD: jc_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - jc_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p$${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jc_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./backend:/var/www/html
    ports:
      - "8000:80"

volumes:
  jc_mysql_data:

